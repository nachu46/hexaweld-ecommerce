version: "3.9"

services:

  backend:
    build:
      context: ./server
    container_name: hexaweld_backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./client
    container_name: hexaweld_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped